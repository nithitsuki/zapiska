<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>zapiska admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #fff; color: #000; font-size: 14px; line-height: 1.5; padding: 20px; }
  a { color: #0066cc; }
  input, button, select, textarea { font: inherit; }
  input, select { border: 1px solid #ccc; padding: 5px 8px; border-radius: 4px; }
  input:focus, select:focus { outline: 2px solid #0066cc; outline-offset: -1px; }
  button { padding: 5px 12px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; }
  button:hover { background: #f0f0f0; }
  button:disabled { opacity: .35; cursor: default; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  td, th { padding: 5px 8px; border: 1px solid #ddd; text-align: left; vertical-align: top; }
  th { background: #f5f5f5; font-weight: 600; font-size: 12px; white-space: nowrap; }
  tr:nth-child(even) td { background: #fafafa; }
  tr:hover td { background: #f0f5ff; }
  .w-full { width: 100%; }
  .flex { display: flex; }
  .flex-wrap { flex-wrap: wrap; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .gap { gap: 8px; }
  .mb { margin-bottom: 8px; }
  .mt { margin-top: 8px; }
  .hidden { display: none !important; }
  .text-mono { font-family: "SF Mono", "Menlo", "Consolas", monospace; font-size: 12px; }
  .text-sm { font-size: 12px; color: #666; }
  .overflow { max-height: 80px; overflow-y: auto; word-break: break-word; }
  .nowrap { white-space: nowrap; }

  .login-box { max-width: 380px; margin: 100px auto; padding: 24px; border: 1px solid #ccc; border-radius: 8px; }
  .login-box h1 { font-size: 22px; margin-bottom: 4px; }
  .login-box .sub { font-size: 13px; color: #666; margin-bottom: 16px; }
  .login-box label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
  .login-box input { width: 100%; margin-bottom: 10px; }
  .login-box .btn-l { width: 100%; padding: 8px; background: #0066cc; color: #fff; border: none; border-radius: 4px; }
  .login-box .btn-l:hover { background: #0052a3; }
  .login-error { display: none; font-size: 13px; color: #c00; margin-bottom: 8px; }

  .stats { display: flex; gap: 4px; margin-bottom: 12px; }
  .stat { flex: 1; border: 1px solid #ddd; border-radius: 4px; padding: 8px 12px; text-align: center; cursor: pointer; }
  .stat:hover { background: #f5f5f5; }
  .stat.active { border-color: #0066cc; background: #f0f5ff; }
  .stat .num { font-size: 18px; font-weight: 700; }
  .stat .lbl { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: .04em; }

  .tabs { display: flex; gap: 2px; }
  .tab { padding: 5px 14px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; background: #fff; font-size: 13px; }
  .tab:hover { background: #f5f5f5; }
  .tab.active { background: #0066cc; color: #fff; border-color: #0066cc; }

  .path-list { border: 1px solid #ddd; border-radius: 4px; overflow: hidden; }
  .path-row { padding: 6px 10px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .path-row:last-child { border-bottom: none; }
  .path-row:hover { background: #f5f5ff; }
  .path-row.active { background: #e8f0fe; }
  .path-row .pname { font-family: "SF Mono", "Menlo", "Consolas", monospace; font-size: 13px; flex: 1; word-break: break-all; }
  .path-row .pcount { font-weight: 700; min-width: 24px; text-align: right; }
  .path-row .pmeta { font-size: 11px; color: #888; }

  .clear-filter { font-size: 11px; color: #c00; cursor: pointer; text-decoration: none; }
  .clear-filter:hover { text-decoration: underline; }
  .filter-active { background: #fff7e6; border-color: #b8860b; }

  .badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; }
  .badge-approved { background: #e6f7e6; color: #1a7d1a; }
  .badge-pending { background: #fff7e6; color: #b8860b; }
  .badge-spam { background: #ffe6e6; color: #c00; }
  .badge-deleted { background: #f0f0f0; color: #888; }
  .badge-wm { background: #e6f0ff; color: #0066cc; }

  .toast-container { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 100; }
  .toast { background: #333; color: #fff; padding: 8px 16px; border-radius: 6px; font-size: 13px; margin-top: 4px; }
  .spinner { width: 16px; height: 16px; border: 2px solid #ddd; border-top-color: #0066cc; border-radius: 50%; animation: spin .5s linear infinite; margin: 24px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { text-align: center; padding: 32px; color: #999; }
</style>
</head>
<body>

<div id="lv" class="login-box">
  <h1>zapiska</h1>
  <div class="sub">moderation</div>
  <label for="ti">admin token</label>
  <input type="password" id="ti" autocomplete="off" autofocus>
  <div class="login-error" id="le">invalid token</div>
  <button class="btn-l" id="lb" onclick="login()">sign in</button>
</div>

<div id="dv" class="hidden">
  <div class="flex items-center justify-between mb">
    <div class="flex items-center gap">
      <strong style="font-size:18px">zapiska</strong>
      <span class="text-sm">admin</span>
    </div>
    <button onclick="logout()">sign out</button>
  </div>

  <div class="stats" id="sb"></div>

  <div class="flex gap" style="align-items:flex-start">
    <div style="width:280px;flex-shrink:0">
      <div class="flex items-center justify-between mb">
        <span class="text-sm"><strong>paths</strong></span>
        <span class="text-sm" id="path-count"></span>
      </div>
      <div class="path-list" id="path-list" style="max-height:70vh;overflow-y:auto"></div>
    </div>

    <div style="flex:1;min-width:0">
      <div class="flex flex-wrap items-center gap mb">
        <div class="tabs" id="tabs">
          <button class="tab" data-s="all">all</button>
          <button class="tab" data-s="pending">pending</button>
          <button class="tab" data-s="approved">approved</button>
          <button class="tab" data-s="spam">spam</button>
          <button class="tab" data-s="deleted">deleted</button>
        </div>
        <div style="display:flex;align-items:center;gap:4px;flex:1;min-width:120px">
          <input type="text" id="pf" placeholder="path filter (e.g. /blog/*)" style="flex:1;border:1px solid #ddd;border-radius:4px;padding:5px 8px">
          <a class="clear-filter hidden" id="clear-pf" onclick="clearPathFilter()" title="clear path filter">clear</a>
        </div>
        <input type="text" id="ipf" placeholder="ip filter" style="width:130px;border:1px solid #ddd;border-radius:4px;padding:5px 8px">
        <select id="sort-select" style="border:1px solid #ddd;border-radius:4px;padding:5px 8px">
          <option value="desc">newest</option>
          <option value="asc">oldest</option>
          <option value="path">by path</option>
        </select>
      </div>
      <div class="flex items-center justify-between mb">
        <span class="text-sm" id="rc"></span>
      </div>
      <div id="cl"></div>
      <div id="lm" class="hidden mt"><button class="w-full" onclick="lm()" style="padding:8px">load more</button></div>
    </div>
  </div>
</div>

<div class="toast-container" id="tc"></div>

<script>
let cs = 'all', bf = null, ld = false, sc = {}, sv = 'desc', selPath = '';
const A = new URLSearchParams(window.location.search).get('api') || window.location.origin;
function ap(p) { return A + p; }

// ── Login/out ──
function login() {
  const t = document.getElementById('ti').value;
  if (!t) return;
  document.getElementById('lb').disabled = true;
  fetch(ap('/api/admin/login'), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: t }) })
  .then(r => {
    document.getElementById('lb').disabled = false;
    if (r.status === 401) { document.getElementById('le').style.display = 'block'; return Promise.reject(); }
    if (!r.ok) return Promise.reject();
    document.getElementById('lv').style.display = 'none';
    document.getElementById('dv').classList.remove('hidden');
    refreshAll();
  })
  .catch(() => { document.getElementById('lb').disabled = false; });
}

function logout() {
  fetch(ap('/api/admin/logout'), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' }).catch(()=>{});
  bf = null; document.getElementById('lv').style.display = 'block'; document.getElementById('dv').classList.add('hidden');
  document.getElementById('ti').value = ''; document.getElementById('cl').innerHTML = '';
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('ti').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  fetch(ap('/api/admin/comments?status=all&limit=1'))
    .then(r => { if (r.ok) { document.getElementById('lv').style.display = 'none'; document.getElementById('dv').classList.remove('hidden'); refreshAll(); } })
    .catch(()=>{});
});

function refreshAll() { ls(); lp(); lc(); }

// ── Tab clicks ──
document.getElementById('tabs').addEventListener('click', function(e) {
  const tab = e.target.closest('.tab');
  if (tab) switchTab(tab.dataset.s);
});

// ── Path browser ──
function lp() {
  fetch(ap('/api/admin/paths')).then(r => r.json()).then(d => {
    const paths = d.paths || [];
    document.getElementById('path-count').textContent = paths.length + ' total';
    document.getElementById('path-list').innerHTML = paths.map(p =>
      '<div class="path-row' + (selPath === p.path ? ' active' : '') + '" onclick="selectPath(\'' + ea(p.path) + '\')">' +
        '<div class="flex items-center gap"><span class="pcount">' + p.total + '</span><span class="pname">' + eh(p.path) + '</span></div>' +
        '<div class="pmeta">' + p.approved + ' approved / ' + p.pending + ' pending / ' + p.spam + ' spam</div>' +
      '</div>'
    ).join('');
  }).catch(()=>{});
}

function selectPath(path) {
  selPath = selPath === path ? '' : path;
  document.querySelectorAll('.path-row').forEach(r => r.classList.toggle('active', r.querySelector('.pname')?.textContent === selPath));
  document.getElementById('pf').value = selPath;
  bf = null; updateFilterUI(); lc();
}

function clearPathFilter() {
  selPath = '';
  document.getElementById('pf').value = '';
  document.querySelectorAll('.path-row').forEach(r => r.classList.remove('active'));
  bf = null; updateFilterUI(); lc();
}

function updateFilterUI() {
  const pf = document.getElementById('pf');
  const clearBtn = document.getElementById('clear-pf');
  const hasFilter = pf.value.trim().length > 0;
  clearBtn.classList.toggle('hidden', !hasFilter);
  pf.classList.toggle('filter-active', hasFilter);
}

// ── Comments API ──
function bu(a) {
  let url = '/api/admin/comments?status=' + cs + '&limit=50';
  const p = document.getElementById('pf').value.trim();
  if (p) {
    // /blog/* → LIKE '/blog/%' for prefix matching
    const pathVal = p.endsWith('/*') ? p.slice(0, -1) + '%' : p;
    url += '&path=' + encodeURIComponent(pathVal);
  }
  const ip = document.getElementById('ipf').value.trim();
  if (ip) url += '&ip=' + encodeURIComponent(ip);
  if (bf && a) url += '&before=' + bf;
  return url;
}

function sortComments(c) {
  if (sv === 'asc') return c.sort((a, b) => a.id - b.id);
  if (sv === 'path') return c.sort((a, b) => a.target_path.localeCompare(b.target_path) || b.id - a.id);
  return c; // desc already default from API
}

function lc(a) {
  if (ld) return; ld = true;
  const l = document.getElementById('cl');
  if (!a) l.innerHTML = '<div class="spinner"></div>';
  fetch(ap(bu(a)))
  .then(r => { if (r.status === 401) { logout(); return null; } return r.json(); })
  .then(d => {
    ld = false; if (!d) return;
    const raw = d.comments || [];
    const comments = sortComments([...raw]);
    if (!a) l.innerHTML = '';
    if (comments.length === 0 && !a) {
      l.innerHTML = '<div class="empty-state">no comments</div>';
      document.getElementById('lm').classList.add('hidden');
      document.getElementById('rc').textContent = '0';
      return;
    }
    if (!a) l.innerHTML =
      '<table><thead><tr><th>id</th><th>author</th><th>status</th><th>type</th><th>path</th><th>content</th><th>date</th><th>ip</th><th style="width:140px">actions</th></tr></thead><tbody></tbody></table>';
    const tbody = l.querySelector('tbody');
    comments.forEach(c => {
      const tr = document.createElement('tr');
      tr.dataset.id = c.id;
      const au = c.author_url ? '<a href="' + ea(c.author_url) + '" target="_blank">' + eh(c.author_name) + '</a>' : eh(c.author_name);
      const sb = '<span class="badge badge-' + eh(c.status) + '">' + eh(c.status) + '</span>';
      const tb = c.comment_type === 'webmention' ? ' <span class="badge badge-wm">WM</span>' : '';
      const dt = c.created_at ? c.created_at.slice(0, 10) : '';
      const ip = c.submitter_ip || '';
      tr.innerHTML =
        '<td class="text-mono">' + c.id + '</td>' +
        '<td>' + au + '</td>' +
        '<td>' + sb + '</td>' +
        '<td style="white-space:nowrap">' + tb + (c.depth > 0 ? ' d' + c.depth : '') + (c.honeypot ? ' <span style="color:#c00;font-size:11px">honeypot</span>' : '') + '</td>' +
        '<td class="text-mono" style="font-size:12px;word-break:break-all">' + eh(c.target_path) + '</td>' +
        '<td class="overflow" style="max-width:250px;font-size:13px">' + (c.content || '') + '</td>' +
        '<td class="nowrap text-sm">' + dt + '</td>' +
        '<td class="text-mono text-sm" style="word-break:break-all">' + ip + '</td>' +
        '<td class="nowrap">' + actButtons(c.id, c.status) + '</td>';
      tbody.appendChild(tr);
    });
    if (raw.length > 0) { bf = raw[raw.length - 1].id; document.getElementById('lm').classList.remove('hidden'); }
    else { document.getElementById('lm').classList.add('hidden'); }
    document.getElementById('rc').textContent = comments.length + (selPath ? ' on ' + selPath : '');
  })
  .catch(() => { ld = false; });
}

function lm() { lc(true); }
let dt;
function dl() { clearTimeout(dt); dt = setTimeout(() => { bf = null; lc(); }, 300); }
document.getElementById('pf').addEventListener('input', function() {
  selPath = '';
  document.querySelectorAll('.path-row').forEach(r => r.classList.remove('active'));
  updateFilterUI(); dl();
});
document.getElementById('ipf').addEventListener('input', dl);
document.getElementById('sort-select').addEventListener('change', function() { sv = this.value; bf = null; lc(); });

// ── Stats ──
function ls() {
  Promise.all(['pending','approved','spam','deleted'].map(st =>
    fetch(ap('/api/admin/comments?status=' + st + '&limit=1'))
      .then(r => r.json()).then(d => ({ status: st, count: d.comments ? d.comments.length : 0 }))
      .catch(() => ({ status: st, count: 0 }))
  )).then(r => {
    sc = {}; let t = 0;
    r.forEach(x => { sc[x.status] = x.count; t += x.count; });
    sc.all = t;
    document.getElementById('sb').innerHTML =
      [['pending','pending'],['approved','approved'],['spam','spam'],['deleted','deleted'],['all','total']]
      .map(x => '<div class="stat' + (cs === x[0] ? ' active' : '') + '" onclick="switchTab(\'' + x[0] + '\')"><div class="num">' + (sc[x[0]] ?? '-') + '</div><div class="lbl">' + x[1] + '</div></div>').join('');
  });
}

// ── Tab switching ──
function switchTab(status) {
  cs = status; bf = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.s === cs));
  document.querySelectorAll('.stat').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.stat').forEach(el => {
    const lbl = el.querySelector('.lbl');
    if (lbl && (lbl.textContent.toLowerCase() === cs || (cs === 'all' && lbl.textContent.toLowerCase() === 'total'))) {
      el.classList.add('active');
    }
  });
  lc(); ls();
}

// ── Action buttons ──
function actButtons(id, status) {
  const m = (a) => ' onclick="m(' + id + ',\'' + a + '\')"';
  switch (status) {
    case 'pending': return '<button' + m('approved') + '>approve</button><button' + m('spam') + '>spam</button><button' + m('deleted') + '>delete</button>';
    case 'approved': return '<button' + m('pending') + '>unapprove</button><button' + m('spam') + '>spam</button><button' + m('deleted') + '>delete</button>';
    case 'spam': return '<button' + m('approved') + '>approve</button><button' + m('pending') + '>unspam</button><button' + m('deleted') + '>delete</button>';
    case 'deleted': return '<button' + m('approved') + '>restore</button><button' + m('pending') + '>undelete</button><button' + m('spam') + '>spam</button>';
    default: return '<button' + m('approved') + '>approve</button><button' + m('spam') + '>spam</button><button' + m('deleted') + '>delete</button>';
  }
}

function m(id, action) {
  const el = document.querySelector('[data-id="' + id + '"]');
  if (el) el.querySelectorAll('button').forEach(b => b.disabled = true);

  // Grab the current status from the badge before it disappears
  let oldStatus = '';
  if (el) {
    const badge = el.querySelector('.badge');
    if (badge) oldStatus = badge.textContent.trim();
  }

  fetch(ap('/api/admin/moderate'), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, action }) })
  .then(r => { if (r.status === 401) { logout(); return null; } return r.json(); })
  .then(d => {
    if (!d) return;
    const el = document.querySelector('[data-id="' + id + '"]');
    if (el) el.remove();
    undoableToast(action, id, oldStatus);
    if (document.querySelectorAll('[data-id]').length === 0) { bf = null; lc(); }
    ls(); lp();
  })
  .catch(() => { if (el) el.querySelectorAll('button').forEach(b => b.disabled = false); });
}

function undoableToast(action, id, oldStatus) {
  const c = document.getElementById('tc'), e = document.createElement('div');
  e.className = 'toast';
  e.innerHTML = '<span>' + action + '</span> <a href="#" style="color:#fff;font-weight:700;margin-left:12px;text-decoration:underline" onclick="undoModerate(' + id + ',\'' + oldStatus + '\',this);return false">undo</a>';
  c.appendChild(e);
  setTimeout(() => { if (e.parentNode) e.remove(); }, 4000);
}

function undoModerate(id, oldStatus, link) {
  if (!oldStatus) return;
  link.textContent = '...';
  fetch(ap('/api/admin/moderate'), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, action: oldStatus }) })
  .then(r => r.json())
  .then(d => {
    if (!d) return;
    const toast = link.closest('.toast');
    if (toast) toast.remove();
    toast('undone');
    // Reload current view to show the restored comment
    bf = null; lc(); ls(); lp();
  })
  .catch(() => { link.textContent = 'failed'; });
}

function toast(m) {
  const c = document.getElementById('tc'), e = document.createElement('div');
  e.className = 'toast'; e.textContent = m;
  c.appendChild(e);
  setTimeout(() => e.remove(), 1500);
}

function eh(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ea(s) { if (!s) return ''; return s.replace(/"/g,'&quot;').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
</script>
</body>
</html>
